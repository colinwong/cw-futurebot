# Local development override — no IB Gateway, PostgreSQL only
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: futurebot
      POSTGRES_PASSWORD: futurebot
      POSTGRES_DB: futurebot
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data

volumes:
  postgres-dev-data:
