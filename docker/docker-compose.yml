services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:latest
    restart: unless-stopped
    ports:
      - "4002:4002"
      - "5900:5900"  # VNC for manual re-authentication
    environment:
      TWS_USERID: ${IB_USERNAME}
      TWS_PASSWORD: ${IB_PASSWORD}
      TRADING_MODE: ${IB_TRADING_MODE:-paper}
      TWS_ACCEPT_INCOMING: "accept"
    volumes:
      - ib-gateway-data:/root/Jts

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: futurebot
      POSTGRES_PASSWORD: futurebot
      POSTGRES_DB: futurebot
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://futurebot:futurebot@postgres:5432/futurebot
      IB_HOST: ib-gateway
      IB_PORT: 4002
      IB_CLIENT_ID: 1
      IB_ACCOUNT: ${IB_ACCOUNT}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      NEWS_ANALYSIS_MODEL: ${NEWS_ANALYSIS_MODEL:-claude-sonnet-4-6}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      HOST: 0.0.0.0
      PORT: 8002
    depends_on:
      - postgres
      - ib-gateway

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8002
      NEXT_PUBLIC_WS_URL: ws://backend:8002/api/ws
    depends_on:
      - backend

volumes:
  postgres-data:
  ib-gateway-data:
